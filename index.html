<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>大忘日记</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none !important; }
        body { background-color: #f8f8f8; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; padding-top: env(safe-area-inset-top); }
        .sub-nav-active { color: #000; font-weight: 800; border-bottom: 2px solid #000; }
        .sub-nav-item { padding: 8px 0; margin: 0 15px; font-size: 14px; color: #aaa; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-day { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 14px; font-size: 13px; background: #fff; position: relative; }
        .has-diary::after { content: ''; width: 4px; height: 4px; background: #ff2442; border-radius: 50%; position: absolute; bottom: 4px; }
        .is-selected { background: #000 !important; color: #fff !important; }
        .heat-map-container { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
        .heat-cell { width: 10px; height: 10px; border-radius: 2px; background: #eee; }
        .heat-cell-active { background: #000 !important; }
        /* 核心修正：确保按钮在 Safari 下可点击 */
        .btn-card { 
            background: white; 
            border-radius: 28px; 
            padding: 1.25rem; 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            border: 1px solid #f1f1f1; 
            width: 100%; 
            position: relative; 
            z-index: 50 !important; 
            cursor: pointer !important;
            touch-action: manipulation;
        }
        .btn-card:active { background-color: #f9f9f9; transform: scale(0.96); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <header class="sticky top-0 z-50 bg-[#f8f8f8]/90 backdrop-blur-xl px-4 pt-4 border-b border-gray-100">
            <div class="flex justify-between items-center mb-2 px-2">
                <div class="w-6"></div>
                <h1 class="text-[22px] font-black tracking-[0.2em] uppercase text-gray-900">大忘日记</h1>
                <div @click="isSearching = !isSearching" class="text-gray-400 p-2 cursor-pointer"><i :class="['fas', isSearching ? 'fa-times' : 'fa-search']"></i></div>
            </div>
            <div v-if="currentTab === 0">
                <div class="flex justify-center mt-2 pb-1">
                    <div @click="subTab = 0" :class="['sub-nav-item', subTab === 0 ? 'sub-nav-active' : '']">时间轴</div>
                    <div @click="subTab = 1" :class="['sub-nav-item', subTab === 1 ? 'sub-nav-active' : '']">那年今日</div>
                </div>
            </div>
        </header>

        <main class="px-4 pb-48 pt-4">
            <section v-if="currentTab === 0" class="space-y-6">
                <div v-for="item in filteredDiaries" :key="item.ts" class="bg-white rounded-[32px] p-6 shadow-sm border border-gray-50 relative">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-3xl font-black">{{ item.date.split('-')[2] }}</span>
                        <div class="flex space-x-3 text-gray-200">
                            <i @click.stop="editDiary(item)" class="fas fa-edit"></i>
                            <i @click.stop="deleteDiary(item.ts)" class="fas fa-trash-alt"></i>
                        </div>
                    </div>
                    <p class="text-[15px] leading-relaxed whitespace-pre-wrap">{{ item.content }}</p>
                    <img v-if="item.img" :src="item.img" class="w-full rounded-[24px] mt-4 shadow-sm">
                </div>
            </section>

            <section v-if="currentTab === 1" class="bg-white rounded-[32px] p-6 border mb-6">
                <div class="text-center font-black mb-6">{{ calYear }}年 {{ calMonth + 1 }}月</div>
                <div class="calendar-grid">
                    <div v-for="empty in firstDayPad" :key="'e'+empty"></div>
                    <div v-for="day in daysInCalMonth" :key="day" @click="selectedDate = day" :class="['calendar-day', hasDiaryOn(day) ? 'has-diary' : '', selectedDate === day ? 'is-selected' : '']">{{ day }}</div>
                </div>
            </section>

            <section v-if="currentTab === 2">
                <div class="bg-white rounded-[40px] p-8 shadow-sm border mb-8 text-center">
                    <div class="flex justify-around mb-8">
                        <div><p class="text-[10px] font-bold text-gray-300">Entries</p><p class="text-4xl font-black italic">{{ diaries.length }}</p></div>
                        <div><p class="text-[10px] font-bold text-gray-300">Words</p><p class="text-4xl font-black italic">{{ totalWords }}</p></div>
                    </div>
                    <div class="heat-map-container">
                        <div v-for="cell in activityHeat" :key="cell.id" :class="['heat-cell', cell.count > 0 ? 'heat-cell-active' : '']"></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button type="button" @click="exportData" class="btn-card">备份</button>
                    <button type="button" @click="$refs.fileInput.click()" class="btn-card">导入</button>
                    <input type="file" ref="fileInput" class="hidden" @change="importData">
                    <div @click="triggerCloud('PUT')" class="btn-card">
                        <span class="text-[9px] font-bold text-gray-300">CLOUD</span>
                        <h4 class="font-black text-sm">云端备份</h4>
                    </div>
                    <div @click="triggerCloud('GET')" class="btn-card">
                        <span class="text-[9px] font-bold text-gray-300">SYNC</span>
                        <h4 class="font-black text-sm">云端恢复</h4>
                    </div>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 w-full bg-white/80 backdrop-blur-xl border-t flex justify-around items-center pt-4 pb-8 z-[100]">
            <div @click="currentTab = 0" :class="currentTab === 0 ? 'text-black' : 'text-gray-300'"><i class="fas fa-book-open"></i></div>
            <div @click="currentTab = 1" :class="currentTab === 1 ? 'text-black' : 'text-gray-300'"><i class="fas fa-calendar-alt"></i></div>
            <div @click="currentTab = 2" :class="currentTab === 2 ? 'text-black' : 'text-gray-300'"><i class="fas fa-user-circle"></i></div>
        </nav>
        <button v-if="currentTab !== 2" @click="openNewModal" class="fixed right-6 bottom-36 w-14 h-14 bg-black text-white rounded-full shadow-2xl flex items-center justify-center z-[150]"><i class="fas fa-plus"></i></button>

        <div v-if="showModal" class="fixed inset-0 bg-white z-[300] p-8 flex flex-col pt-16">
            <div class="flex justify-between items-center mb-6"><i @click="showModal = false" class="fas fa-times text-gray-300"></i><button @click="saveDiary" class="bg-black text-white px-8 py-2 rounded-full font-black text-sm">完成</button></div>
            <textarea v-model="newContent" class="w-full flex-1 text-xl focus:outline-none resize-none" placeholder="写点什么..."></textarea>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;
        createApp({
            setup() {
                const currentTab = ref(0), subTab = ref(0), showModal = ref(false), diaries = ref([]);
                const newContent = ref(''), previewImg = ref(''), customDate = ref(''), editingTs = ref(null);
                const isSearching = ref(false), searchQuery = ref(''), historyDate = ref(new Date().toISOString().split('T')[0]);
                const calYear = ref(new Date().getFullYear()), calMonth = ref(new Date().getMonth()), selectedDate = ref(new Date().getDate());

                onMounted(() => { 
                    const s = localStorage.getItem('diary_v2026_final'); 
                    if (s) diaries.value = JSON.parse(s);
                });

                const triggerCloud = async (mode) => {
                    // 强制弹窗测试，Safari 绝不能跳过这个
                    console.log("Button clicked, mode:", mode);
                    
                    const config = {
                        proxy: 'https://cors-anywhere.herokuapp.com/',
                        davUrl: 'https://dav.jianguoyun.com/dav/',
                        user: 'evelyn_1124@live.com', 
                        pass: 'adar6c3rbakgn85b',
                        fileName: 'dawang_diary_v2026.json'
                    };

                    if (!config.user || config.user.includes('你的')) {
                        alert("⚠️ 请在代码中配置您的坚果云账号和第三方密码后再使用云端功能。");
                        return;
                    }

                    const auth = btoa(`${config.user}:${config.pass}`);
                    const url = `${config.proxy}${config.davUrl}${config.fileName}`;

                    try {
                        if (mode === 'PUT') {
                            const res = await fetch(url, { method: 'PUT', headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }, body: JSON.stringify(diaries.value) });
                            if (res.ok) alert("✅ 云端备份成功！");
                            else alert("❌ 备份失败，可能需要访问代理官网点确认。");
                        } else {
                            const res = await fetch(url, { method: 'GET', headers: { 'Authorization': `Basic ${auth}` } });
                            if (res.ok) {
                                const data = await res.json();
                                if (confirm(`找到 ${data.length} 条记录，覆盖本地？`)) {
                                    diaries.value = data;
                                    localStorage.setItem('diary_v2026_final', JSON.stringify(diaries.value));
                                    alert("✅ 同步成功！");
                                }
                            } else alert("❌ 未找到备份。");
                        }
                    } catch (e) { alert("❌ 连接超时或代理未响应。"); }
                };

                return {
                    triggerCloud, currentTab, subTab, showModal, diaries, newContent, isSearching, searchQuery, historyDate, calYear, calMonth, selectedDate,
                    filteredDiaries: computed(() => diaries.value.sort((a,b) => b.date.localeCompare(a.date))),
                    daysInCalMonth: computed(() => new Date(calYear.value, calMonth.value + 1, 0).getDate()),
                    firstDayPad: computed(() => new Date(calYear.value, calMonth.value, 1).getDay()),
                    hasDiaryOn: (d) => diaries.value.some(x => x.date === `${calYear.value}-${String(calMonth.value + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`),
                    selectedDayDiaries: computed(() => diaries.value.filter(x => x.date === `${calYear.value}-${String(calMonth.value + 1).padStart(2, '0')}-${String(selectedDate.value).padStart(2, '0')}`)),
                    changeMonth: (v) => { let d = new Date(calYear.value, calMonth.value + v, 1); calYear.value = d.getFullYear(); calMonth.value = d.getMonth(); },
                    totalWords: computed(() => diaries.value.reduce((a, d) => a + (d.content?.length || 0), 0)),
                    activityHeat: computed(() => { const res = []; for (let i = 0; i < 84; i++) res.push({ id: i, count: 0 }); return res; }),
                    exportData: () => { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(diaries.value)], { type: "application/json" })); a.download = `大忘备份.json`; a.click(); },
                    importData: (e) => { const r = new FileReader(); r.onload = (ev) => { diaries.value = JSON.parse(ev.target.result); alert("导入成功"); }; r.readAsText(e.target.files[0]); },
                    openNewModal: () => { newContent.value = ''; showModal.value = true; },
                    saveDiary: () => { diaries.value.unshift({ content: newContent.value, date: new Date().toISOString().split('T')[0], ts: Date.now() }); localStorage.setItem('diary_v2026_final', JSON.stringify(diaries.value)); showModal.value = false; }
                };
            }
        }).mount('#app')
    </script>
</body>
</html>
